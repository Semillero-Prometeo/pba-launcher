services:
  # =============================
  # DATABASE
  # =============================
  db:
    image: postgres:17.1-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}

  # =============================
  # NATS SERVER
  # =============================
  nats-server:
    image: nats:2.12.5-alpine3.22
    ports:
      - "8222:8222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf
    command: "-c /etc/nats/nats.conf"

  # =============================
  # MAFCS MS GATEWAY
  # =============================
  pba-ms-gateway:
    build:
      context: ./pba-ms-gateway
      dockerfile: Dockerfile.dev
    ports:
      - "${MS_GATEWAY_PORT}:${MS_GATEWAY_PORT}"
      - "9230:9230"
    volumes:
      - ./pba-ms-gateway/src:/usr/src/app/src
      - /usr/src/app/node_modules
    depends_on:
      - db
      - nats-server
    command: npm run start:debug
    environment:
      - NATS_SERVER=nats://nats-server:4222
      - PORT=${MS_GATEWAY_PORT}
      - NODE_ENV=development
      - DATABASE_URL=${MS_GATEWAY_DATABASE_URL}
      - SECRET=${MS_GATEWAY_SECRET}
      - RESTORE_PASSWORD_SECRET=${MS_GATEWAY_RESTORE_PASSWORD_SECRET}
      - PROJECT_ID=${MS_GATEWAY_PROJECT_ID}

  # =============================
  # PBA MS AUTH
  # =============================
  pba-ms-auth:
    build:
      context: ./pba-ms-auth
      dockerfile: Dockerfile.dev
    ports:
      - "${MS_AUTH_PORT}:${MS_AUTH_PORT}"
      - "9231:9231"
    volumes:
      - ./pba-ms-auth/src:/usr/src/app/src
      - /usr/src/app/node_modules
    command: npm run start:debug
    environment:
      - NATS_SERVER=nats://nats-server:4222
      - PORT=${MS_AUTH_PORT}
      - NODE_ENV=development
      - DATABASE_URL=${MS_AUTH_DATABASE_URL}
      - SECRET=${MS_AUTH_SECRET}
      - RESTORE_PASSWORD_SECRET=${MS_AUTH_RESTORE_PASSWORD_SECRET}
      - PROJECT_ID=${MS_AUTH_PROJECT_ID}

  # =============================
  # PBA MS MANAGEMENT
  # =============================
  pba-ms-management:
    build:
      context: ./pba-ms-management
      dockerfile: Dockerfile.dev
    ports:
      - "${MS_MANAGEMENT_PORT}:${MS_MANAGEMENT_PORT}"
      - "9232:9232"
    volumes:
      - ./pba-ms-management/src:/usr/src/app/src
      - /usr/src/app/node_modules
    command: npm run start:debug
    environment:
      - NATS_SERVER=nats://nats-server:4222
      - PORT=${MS_MANAGEMENT_PORT}
      - NODE_ENV=development
      - DATABASE_URL=${MS_MANAGEMENT_DATABASE_URL}
      - OPENAI_API_KEY=${MS_MANAGEMENT_OPENAI_API_KEY}
      - OPENAI_SYSTEM_PROMPT=${MS_MANAGEMENT_OPENAI_SYSTEM_PROMPT}
      - OPENAI_MODEL=${MS_MANAGEMENT_OPENAI_MODEL}

  pba-ms-robotics:
    build:
      context: ./pba-ms-robotics
      dockerfile: Dockerfile.dev
    ports:
      - "${MS_ROBOTICS_PORT}:${MS_ROBOTICS_PORT}"
      - "9233:9233"
    volumes:
      - ./pba-ms-robotics:/usr/src/app
      - ${GCLOUD_CONFIG_PATH:-~/.config/gcloud}:/root/.config/gcloud
      - /run/user/1000/pulse:/run/user/1000/pulse
    command: uvicorn src.app:app --host 0.0.0.0 --port ${MS_ROBOTICS_PORT} --reload --reload-dir /usr/src/app --reload-exclude .venv
    environment:
      - NATS_SERVER=nats://nats-server:4222
      - PORT=${MS_ROBOTICS_PORT}
      - ENV=development
      - PIPER_MODEL_PATH=${MS_ROBOTICS_PIPER_MODEL_PATH:-}
      - ESPEAK_VOICE=${MS_ROBOTICS_ESPEAK_VOICE:-es}
      - VOICE_SKIP_PLAYBACK=${MS_ROBOTICS_VOICE_SKIP_PLAYBACK:-0}
      # PulseAudio del HOST (imprescindible para Bluetooth): ej. unix:/run/user/1000/pulse/native
      - PULSE_SERVER=${MS_ROBOTICS_PULSE_SERVER:-}
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # =============================
  # PMAS WEB MAIN (Angular)
  # =============================
  pmas-web-main:
    build:
      context: ./pmas-web-main
      dockerfile: Dockerfile.dev
    ports:
      - "${WEB_MAIN_PORT}:${WEB_MAIN_PORT}"
    volumes:
      - ./pmas-web-main:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start -- --host 0.0.0.0 --port ${WEB_MAIN_PORT} --poll 2000
    environment:
      - WEB_MAIN_PORT=${WEB_MAIN_PORT}
      - NODE_OPTIONS=--max-old-space-size=4096

  # =============================
  # PMAI CORE
  # =============================
  pmai-core:
    build:
      context: ./pmai-mai-core
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./pmai-mai-core:/app
      - ./data:/data:ro
    environment:
      NATS_SERVER: nats://nats-server:4222
      PMAI_SETTINGS: ${PMAI_CORE_SETTINGS}
      PYTHONPATH: ${PMAI_CORE_PYTHONPATH}
      OMP_NUM_THREADS: ${PMAI_CORE_OMP_NUM_THREADS}
      MKL_NUM_THREADS: ${PMAI_CORE_MKL_NUM_THREADS}
      OPENBLAS_NUM_THREADS: ${PMAI_CORE_OPENBLAS_NUM_THREADS}
    depends_on:
      - nats-server
    ports:
      - "${PMAI_CORE_PORT}:${PMAI_CORE_PORT}"
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # V4L2 devices — only needed on native Linux (production).
    # On WSL2 these may not work; use camera.sources in settings.toml instead.
    # devices:
    #   - /dev/video0:/dev/video0
    #   - /dev/video1:/dev/video1
    command:
      - /bin/bash
      - -lc
      - >
        watchfiles "python -m pmai_core /app/settings.toml" /app/src

volumes:
  pba-ms-gateway-node_modules:
  pba-ms-auth-node_modules:
  pba-ms-management-node_modules:
  pba-ms-robotics-node_modules:
